name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Connect IQ SDK
        run: |
          SDK_URL=$(curl -s https://developer.garmin.com/downloads/connect-iq/sdks/sdks.json | \
            jq -r '.[] | select(.version=="9.1.0") | .linux')
          wget -q "https://developer.garmin.com/downloads/connect-iq/sdks/$SDK_URL" -O /tmp/sdk.zip
          mkdir -p $HOME/connectiq-sdk
          unzip -q /tmp/sdk.zip -d $HOME/connectiq-sdk
          echo "$HOME/connectiq-sdk/bin" >> $GITHUB_PATH

      - name: Install device files
        run: |
          mkdir -p $HOME/.Garmin/ConnectIQ/Devices
          unzip -q .ci/devices/edge-devices.zip -d $HOME/.Garmin/ConnectIQ/Devices

      - name: Decode developer key
        env:
          DEVELOPER_KEY_BASE64: ${{ secrets.DEVELOPER_KEY_BASE64 }}
        run: echo "$DEVELOPER_KEY_BASE64" | base64 --decode > developer_key.der

      - name: Build .iq package
        run: monkeyc -f monkey.jungle -o bin/Pw2Hr.iq -e -y developer_key.der -r

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Pw2Hr.iq
          generate_release_notes: true
